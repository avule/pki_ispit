<mat-toolbar color="primary">
  <a routerLink="/" class="app-title">
    <mat-icon>theaters</mat-icon> Bioskop
  </a>
  <span class="spacer"></span>
  <button mat-button routerLink="/movies"><mat-icon>movie</mat-icon> Filmovi</button>
  <button mat-button routerLink="/search"><mat-icon>search</mat-icon> Pretraga</button>
  <button mat-button routerLink="/cart">
    <mat-icon>shopping_cart</mat-icon> Korpa
    <span *ngIf="(cartItemCount | async) !== null && (cartItemCount | async)! > 0" class="cart-badge">{{ cartItemCount | async }}</span>
  </button>
  <button mat-button routerLink="/purchase-history">
    <mat-icon>confirmation_number</mat-icon> Moje Karte
  </button>

  <ng-container *ngIf="(isLoggedIn | async) as loggedIn; else loggedOut">
    <button mat-button [matMenuTriggerFor]="profileMenu">
      <mat-icon>account_circle</mat-icon>
      <span *ngIf="(currentUser | async) as user">{{ user.firstName }}</span>
    </button>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person</mat-icon>
        <span>Moj Profil</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Odjavi se</span>
      </button>
    </mat-menu>
  </ng-container>
  <ng-template #loggedOut>
    <button mat-button routerLink="/login"><mat-icon>login</mat-icon> Prijavi se</button>
    <button mat-button color="warn" routerLink="/register">
      <mat-icon>person_add</mat-icon> Registruj se
    </button>
  </ng-template>
</mat-toolbar>
